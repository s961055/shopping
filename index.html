<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品總覽 | 夏日防曬外套專區</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
      background: #f2f4f8;
      color: #333;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      padding: 40px 20px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(255,255,255,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-tag {
      display: inline-block;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.85);
      font-size: .78rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 16px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.3;
    }

    header p {
      margin-top: 10px;
      color: rgba(255,255,255,.65);
      font-size: .92rem;
      letter-spacing: .5px;
    }

    .badge-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .badge {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: white;
      font-size: .78rem;
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      transition: transform .28s ease, box-shadow .28s ease;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,.14);
    }

    .card-thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #eee;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease;
      display: block;
    }

    .product-card:hover .card-thumb img {
      transform: scale(1.07);
    }

    .card-ribbon {
      position: absolute;
      top: 14px;
      left: 0;
      background: #e63946;
      color: white;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 12px 4px 10px;
      border-radius: 0 20px 20px 0;
      box-shadow: 2px 2px 6px rgba(0,0,0,.2);
    }

    .card-body {
      padding: 20px 20px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-brand {
      font-size: .72rem;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      background: #f0f4ff;
      color: #3a5ccc;
      font-size: .72rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    .card-desc {
      font-size: .85rem;
      color: #666;
      line-height: 1.6;
      flex: 1;
      margin-bottom: 16px;
    }

    .card-listing-time {
      font-size: .75rem;
      color: #aaa;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-listing-time::before {
      content: "🕐";
      font-size: .78rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid #f0f0f0;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #e63946;
    }

    .price span {
      font-size: .8rem;
      font-weight: 500;
      color: #aaa;
      text-decoration: line-through;
      margin-left: 6px;
    }

    .btn-detail {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #1a1a2e, #302b63);
      color: white;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      transition: opacity .2s, transform .2s;
    }

    .btn-detail:hover {
      opacity: .88;
      transform: scale(1.03);
    }

    /* ── Info Strip ── */
    .info-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 50px;
      padding: 28px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #444;
    }

    .info-icon {
      font-size: 1.6rem;
    }

    .info-text strong {
      display: block;
      font-size: .9rem;
      color: #1a1a2e;
    }

    .info-text span {
      font-size: .78rem;
      color: #888;
    }

    /* ── Search Bar ── */
    .search-bar {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 22px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }

    .search-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 160px;
    }

    .search-group label {
      font-size: .75rem;
      font-weight: 700;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .search-group input {
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .9rem;
      color: #333;
      outline: none;
      transition: border-color .2s;
      background: #fafafa;
    }

    .search-group input:focus {
      border-color: #302b63;
      background: white;
    }

    .price-range {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .price-range input {
      width: 100px;
    }

    .price-sep {
      color: #aaa;
      font-size: .9rem;
    }

    .btn-search {
      background: linear-gradient(135deg, #1a1a2e, #302b63);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 26px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }

    .btn-search:hover {
      opacity: .88;
      transform: scale(1.03);
    }

    .btn-reset {
      background: #f0f0f0;
      color: #555;
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }

    .no-result {
      display: none;
      text-align: center;
      padding: 48px 20px;
      color: #aaa;
      font-size: 1rem;
      grid-column: 1 / -1;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .page-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      color: #444;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover:not(:disabled) {
      border-color: #302b63;
      color: #302b63;
      background: #f0f4ff;
    }

    .page-btn.active {
      background: linear-gradient(135deg, #1a1a2e, #302b63);
      color: white;
      border-color: transparent;
    }

    .page-btn:disabled {
      opacity: .38;
      cursor: default;
    }

    .page-info {
      font-size: .82rem;
      color: #999;
      margin: 0 4px;
    }

    /* ── Back to Top ── */
    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #1a1a2e, #302b63);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s, opacity 0.2s;
      z-index: 1000;
    }

    .back-to-top:hover {
      transform: scale(1.1);
      opacity: 0.9;
    }

    /* ── FAQ Section ── */
    .faq-section {
      margin-top: 50px;
      padding: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    .faq-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .faq-item {
      border-bottom: 1px solid #f0f0f0;
      padding: 15px 0;
    }

    .faq-item:last-child {
      border-bottom: none;
    }

    .faq-question {
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .faq-question::after {
      content: '▼';
      font-size: 0.7rem;
      color: #aaa;
      transition: transform 0.3s;
    }

    .faq-item.active .faq-question::after {
      transform: rotate(180deg);
    }

    .faq-answer {
      font-size: 0.88rem;
      color: #666;
      margin-top: 10px;
      display: none;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .faq-item.active .faq-answer {
      display: block;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px 20px;
      color: #aaa;
      font-size: .78rem;
      border-top: 1px solid #e8e8e8;
    }
  </style>
</head>
<body>

<header>
  <div class="brand-tag">Summer Collection 2026</div>
  <h1>🧥 夏日穿搭精選</h1>
  <p>防曬外套・韓國上衣・男女款・S～4XL 大尺碼</p>
  <div class="badge-row">
    <span class="badge">❄️ 冰絲涼感</span>
    <span class="badge">🌞 360° 防曬抗UV</span>
    <span class="badge">🐎 POLO刺繡小馬</span>
    <span class="badge">✂️ V領收腰顯瘦</span>
    <span class="badge">🇰🇷 韓國東大門</span>
    <span class="badge">💖 情侶款</span>
  </div>
</header>

<main>
  <div class="section-title">全部商品</div>

  <!-- 搜尋列 -->
  <div class="search-bar">
    <div class="search-group" style="flex:2; min-width:200px;">
      <label>產品名稱</label>
      <input type="text" id="searchName" placeholder="輸入關鍵字…">
    </div>
    <div class="search-group">
      <label>價格區間</label>
      <div class="price-range">
        <input type="number" id="priceMin" placeholder="最低" min="0">
        <span class="price-sep">～</span>
        <input type="number" id="priceMax" placeholder="最高" min="0">
      </div>
    </div>
    <button class="btn-search" onclick="filterProducts()">搜尋</button>
    <button class="btn-reset" onclick="resetFilter()">重置</button>
  </div>

  <div class="product-grid" id="productGrid">
    <div class="no-result" id="noResult">找不到符合條件的商品，請嘗試其他關鍵字或調整價格區間。</div>
  </div>

  <!-- 分頁 -->
  <div class="pagination" id="pagination"></div>

  <!-- FAQ 區塊 -->
  <div class="faq-section" id="faqSection" style="display: none; margin-top: 40px;">
    <div class="faq-title">🤔 常見問題 FAQ</div>
    <div id="faqList"></div>
  </div>

  <!-- Info strip -->
  <div class="info-strip">
    <div class="info-item">
      <div class="info-icon">🚚</div>
      <div class="info-text">
        <strong>全台配送</strong>
        <span>宅配・超商取貨</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon">🔄</div>
      <div class="info-text">
        <strong>7 天鑑賞期</strong>
        <span>不滿意可退換</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon">🛡️</div>
      <div class="info-text">
        <strong>品質保證</strong>
        <span>專櫃同等品質</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon">💳</div>
      <div class="info-text">
        <strong>多元付款</strong>
        <span>信用卡・LINE Pay・匯款</span>
      </div>
    </div>
  </div>
</main>

<footer>© 2026 夏日防曬外套專區 · 所有商品圖片僅供參考</footer>

<!-- 返回頂部按鈕 -->
<button id="backToTop" class="back-to-top" onclick="scrollToTop()" title="返回頂部">↑</button>

<script>
  const PAGE_SIZE = 9;
  let currentPage = 1;
  let allProducts = [];
  let filteredProducts = [];

  async function loadProducts() {
    try {
      const response = await fetch('data.json');
      const data = await response.json();
      // Convert object to array and keep the key as 'id'
      allProducts = Object.entries(data.information).map(([id, product]) => ({
        id,
        ...product
      }));
      filterProducts();

      // 載入 FAQ
      if (data.config && data.config.faq && data.config.faq.length > 0) {
        renderFAQ(data.config.faq);
      }
    } catch (error) {
      console.error("Error loading products:", error);
      document.getElementById('productGrid').innerHTML = '<div style="text-align:center; padding: 40px; color: red;">載入商品失敗，請稍後再試。</div>';
    }
  }

  function renderFAQ(faqData) {
    const faqSection = document.getElementById('faqSection');
    const faqList = document.getElementById('faqList');
    faqList.innerHTML = '';

    faqData.forEach(item => {
      const faqItem = document.createElement('div');
      faqItem.className = 'faq-item';
      faqItem.innerHTML = `
        <div class="faq-question">${item.title}</div>
        <div class="faq-answer">${item.answer}</div>
      `;
      faqItem.querySelector('.faq-question').onclick = () => {
        faqItem.classList.toggle('active');
      };
      faqList.appendChild(faqItem);
    });

    faqSection.style.display = 'block';
  }

  function renderProducts(page) {
    currentPage = page;
    const grid = document.getElementById('productGrid');
    
    // Clear existing cards (except no-result message)
    const cards = grid.querySelectorAll('.product-card');
    cards.forEach(card => card.remove());

    const start = (page - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const pageProducts = filteredProducts.slice(start, end);

    pageProducts.forEach(product => {
      const card = document.createElement('div');
      card.className = 'product-card';
      
      const firstImage = `${product.id}/${product.images[0]}`;
      const originalPriceHtml = product.originalPrice ? `<span>$${product.originalPrice.toLocaleString()}</span>` : '';
      
      let tagsHtml = '';
      product.tags.forEach(tag => {
        tagsHtml += `<span class="tag">${tag}</span>`;
      });

      card.innerHTML = `
        <a href="template.html?id=${product.id}" class="card-thumb">
          <img src="${firstImage}" alt="${product.name}">
          ${product.ribbon ? `<div class="card-ribbon">${product.ribbon}</div>` : ''}
        </a>
        <div class="card-body">
          <div class="card-brand">${product.brand}</div>
          <div class="card-title">${product.shortName || product.name}</div>
          <div class="card-tags">${tagsHtml}</div>
          <div class="card-desc">${product.desc.split('\n')[0]}</div>
          <div class="card-listing-time">上架時間：${product.listingTime}</div>
          <div class="card-footer">
            <div>
              <div class="price">$${product.price.toLocaleString()}${originalPriceHtml}</div>
            </div>
            <a href="template.html?id=${product.id}" class="btn-detail">查看詳情 ›</a>
          </div>
        </div>
      `;
      grid.insertBefore(card, document.getElementById('noResult'));
    });

    document.getElementById('noResult').style.display = filteredProducts.length === 0 ? 'block' : 'none';
    renderPagination();
  }

  function renderPagination() {
    const total = Math.ceil(filteredProducts.length / PAGE_SIZE);
    const container = document.getElementById('pagination');
    container.innerHTML = '';

    if (total <= 1 && filteredProducts.length > 0) return;
    if (filteredProducts.length === 0) return;

    const prev = document.createElement('button');
    prev.className = 'page-btn';
    prev.textContent = '‹ 上一頁';
    prev.disabled = currentPage === 1;
    prev.onclick = () => renderProducts(currentPage - 1);
    container.appendChild(prev);

    for (let i = 1; i <= total; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
      btn.textContent = i;
      btn.onclick = () => renderProducts(i);
      container.appendChild(btn);
    }

    const next = document.createElement('button');
    next.className = 'page-btn';
    next.textContent = '下一頁 ›';
    next.disabled = currentPage === total;
    next.onclick = () => renderProducts(currentPage + 1);
    container.appendChild(next);

    const info = document.createElement('span');
    info.className = 'page-info';
    info.textContent = `第 ${currentPage} / ${total} 頁・共 ${filteredProducts.length} 件`;
    container.appendChild(info);
  }

  function filterProducts() {
    const keyword = document.getElementById('searchName').value.trim().toLowerCase();
    const minPrice = parseFloat(document.getElementById('priceMin').value) || 0;
    const maxPrice = parseFloat(document.getElementById('priceMax').value) || Infinity;

    filteredProducts = allProducts.filter(product => {
      const nameMatch = product.name.toLowerCase().includes(keyword) || 
                        product.brand.toLowerCase().includes(keyword) ||
                        product.desc.toLowerCase().includes(keyword);
      const priceMatch = product.price >= minPrice && product.price <= maxPrice;
      return nameMatch && priceMatch;
    });

    renderProducts(1);
  }

  function resetFilter() {
    document.getElementById('searchName').value = '';
    document.getElementById('priceMin').value = '';
    document.getElementById('priceMax').value = '';
    filterProducts();
  }

  // 初始化
  loadProducts();

  // 按 Enter 觸發搜尋
  ['searchName', 'priceMin', 'priceMax'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') filterProducts();
    });
  });

  // 返回頂部功能
  const backToTopBtn = document.getElementById('backToTop');

  window.onscroll = function() {
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
      backToTopBtn.style.display = "flex";
    } else {
      backToTopBtn.style.display = "none";
    }
  };

  function scrollToTop() {
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }
</script>

</body>
</html>
